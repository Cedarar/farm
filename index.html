// 小摊 ROI 区段（来自攻略 P5）
function shopRoiBand(level) {
  if (level <= 3) return { tag: "秒升", color: "#2a7a3a", advice: "眼睛一闭就升，不升亏。", tier: 1 };
  if (level <= 5) return { tag: "必升", color: "#5a9a3a", advice: "攒几茬西瓜就能升，必须升。", tier: 2 };
  if (level <= 8) return { tag: "值升", color: "#c0a030", advice: "稳定回本，Lv8 是甜点位（+35%）。", tier: 3 };
  if (level <= 13) return { tag: "缓升", color: "#c07030", advice: "等开新地+高等级作物再升。", tier: 4 };
  return { tag: "冷藏", color: "#c04040", advice: "同样的钱开新土地 ROI 高几倍。", tier: 5 };
}

// ========== 小摊售价加成（小摊等级 N → 加成 (N-1)*5%） ==========
function shopBoost(level) { return 1 + (level - 1) * 0.05; }

// 综合分（来自攻略 P3）：收益/h + 经验/h × 3
// 经验加权 3 倍，因为升级后解锁更高收益作物有复利效应
function combinedScore(crop, boost) {
  const coinPerH = (crop.profit * boost) / crop.hours;
  const expPerH = crop.exp / crop.hours;
  return { coinPerH, expPerH, score: coinPerH + expPerH * 3 };
}

// ========== 规划器核心算法（4 种模式） ==========
// mode: levelup / newland / mutation / lifestyle
function plan(farmLv, shopLv, landCount, mode, lifestyleId) {
  const available = CROPS.filter(c => c.unlock <= farmLv);
  if (!available.length) return null;

  const boost = shopBoost(shopLv);

  // 根据模式计算每种作物的得分
  const scored = available.map(c => {
    const { coinPerH, expPerH, score: combo } = combinedScore(c, boost);
    let score;
    switch (mode) {
      case "levelup":
        // 综合分（攻略核心公式）
        score = combo;
        break;
      case "newland":
        // 纯金币（攒钱开新地）
        score = coinPerH;
        break;
      case "mutation":
        // 变异偏好：变异上限 3 加 50% 权重，2 加 20%，1 不加
        const mutBoost = c.varCap >= 3 ? 1.5 : c.varCap >= 2 ? 1.2 : 1.0;
        score = combo * mutBoost;
        break;
      case "lifestyle":
        // 作息模式：只给匹配时长的作物高分，其余压低
        const ls = LIFESTYLES.find(l => l.id === lifestyleId);
        if (!ls) return null;
        const hoursMatch = ls.preferHours.includes(c.hours) ||
                          (c.hours <= 1 && ls.preferHours.includes(1)) ||
                          (c.hours >= 8 && c.hours <= 16 && ls.preferHours.some(h => h >= 8));
        const nameMatch = ls.crops.includes(c.name);
        score = combo * (nameMatch ? 1.8 : hoursMatch ? 1.1 : 0.3);
        break;
      default:
        score = combo;
    }
    return { ...c, coinPerH, expPerH, combo, score };
  }).filter(Boolean).sort((a, b) => b.score - a.score);

  if (!scored.length) return null;

  // 组合优化：主力 + 副作物搭配分配地块
  // 主力占 60-80%，副作物占 20-40%
  const main = scored[0];
  let alt = scored.find(c => c.name !== main.name && c.hours !== main.hours);
  if (!alt) alt = scored[1] || main;

  // 根据作物成熟时长组合决定分配比例
  const mainPct = main.hours <= 1 ? 70 : main.hours <= 8 ? 60 : 70;
  const altPct = 100 - mainPct;
  const mainPlots = Math.round(landCount * mainPct / 100);
  const altPlots = landCount - mainPlots;

  // 24h 预期（考虑每种作物能成熟几轮）
  const roundsMain = 24 / main.hours;
  const roundsAlt = 24 / alt.hours;
  const totalCoin = main.coinPerH * 24 * mainPlots + alt.coinPerH * 24 * altPlots;
  const totalExp = main.expPerH * 24 * mainPlots + alt.expPerH * 24 * altPlots;

  // 里程碑：下一个解锁
  const nextUnlock = UNLOCK_MILESTONES.find(m => m.lv > farmLv);

  return {
    main, alt, mainPct, altPct, mainPlots, altPlots,
    totalCoin, totalExp, roundsMain, roundsAlt,
    landCount, farmLv, shopLv,
    shopBand: shopRoiBand(shopLv),
    nextUnlock
  };
}

function gameStageBadge(farmLv) {
  if (farmLv < 18) return { label: "起步期 Lv1-17", tip: "短时刷经验为主" };
  if (farmLv < 28) return { label: "财富分水岭 Lv18-27", tip: "香蕉挂机攒钱" };
  if (farmLv < 38) return { label: "主力期 Lv28-37", tip: "柚子印钞机 + 英雄变异" };
  return { label: "终章 Lv38+", tip: "西瓜无脑 + 洋葱短时" };
}

function scoreWeekendPlan(plan, farmLv, plotCount) {
  if (farmLv < plan.minLv) return { score: 0, locked: true, reason: `需 Lv${plan.minLv}+ 解锁相关作物` };
  if (plotCount < plan.minPlots) return { score: 0, locked: true, reason: `至少 ${plan.minPlots} 块地` };

  // 评分 0-100
  // 等级契合：超过 minLv 10 级以上满分
  const lvBonus = Math.min(1, (farmLv - plan.minLv) / 10);
  // 地块契合：接近 idealPlots 满分
  const plotFit = Math.min(1, plotCount / plan.idealPlots);
  const score = Math.round((lvBonus * 0.4 + plotFit * 0.6) * 100);
  return { score: Math.max(score, 40), locked: false };
}

function renderWeekend() {
  const farmLv = parseInt(document.getElementById("in-farm-w").value) || 1;
  const plots = parseInt(document.getElementById("in-land-w").value) || 1;
  const box = document.getElementById("strategy-list");

  const evaluated = WEEKEND_PLANS.map(p => ({
    ...p,
    eval: scoreWeekendPlan(p, farmLv, plots)
  }));

  // 解锁的按匹配度排序，锁住的按 minLv 升序放到末尾
  const unlocked = evaluated.filter(p => !p.eval.locked).sort((a, b) => b.eval.score - a.eval.score);
  const locked = evaluated.filter(p => p.eval.locked).sort((a, b) => a.minLv - b.minLv);
  const sorted = [...unlocked, ...locked];
  const bestId = unlocked[0]?.id || null;

  const summary = `
    <div class="out-section" style="padding: 12px;">
      <h3>匹配结果</h3>
      <div class="kpi-grid">
        <div class="kpi"><div class="k">可用策略</div><div class="v">${unlocked.length}</div></div>
        <div class="kpi"><div class="k">已锁定</div><div class="v" style="color: #888;">${locked.length}</div></div>
        <div class="kpi"><div class="k">最高匹配</div><div class="v">${unlocked[0]?.eval.score || 0}</div></div>
      </div>
      <small>Lv ${farmLv} · ${plots} 块地 · 共 ${WEEKEND_PLANS.length} 套流派</small>
    </div>
  `;

  const cards = sorted.map(p => {
    const isLocked = p.eval.locked;
    const isBest = p.id === bestId;
    return `
      <div class="strategy-card ${isBest ? "best" : ""}" style="${isLocked ? "opacity:.45;" : ""}">
        <div class="sc-head">
          <div class="sc-emoji">${p.emoji}</div>
          <div style="flex: 1;">
            <div class="sc-title">${p.name}${isBest ? '<span class="badge-best">最匹配</span>' : ""}</div>
            <div style="font-size: 11px; color: #888;">${p.tag} · 需 Lv${p.minLv}+ / ${p.minPlots}块+</div>
          </div>
          <div class="sc-score">
            ${isLocked ? `<span style="color: #c04040; font-size: 11px;">🔒 ${p.eval.reason}</span>` :
              `匹配度 <b>${p.eval.score}</b>
              <div class="score-bar" style="width:60px;"><div class="score-fill" style="width:${p.eval.score}%;"></div></div>`}
          </div>
        </div>

        <div style="font-size: 13px; color: #555; line-height: 1.5; margin-bottom: 8px;">${p.desc}</div>

        <div class="mix-bar">
          ${p.mix.map(m => `<div class="mix-seg ${m.color}" style="flex: ${m.pct};">${em(m.crop)} ${m.crop} ${m.pct}%</div>`).join("")}
        </div>

        <div class="sc-meta">
          ${p.meta.map(t => {
            const parts = t.split(" ");
            const lbl = parts[0];
            const val = parts.slice(1).join(" ");
            return `<div>${lbl}<b>${val}</b></div>`;
          }).join("")}
        </div>

        <div style="font-size: 12px; color: #444; margin-top: 6px;">
          ${p.schedule.map(([t, act]) => `<div class="timeline-row"><span class="t">${t}</span><span>${act}</span></div>`).join("")}
        </div>
      </div>`;
  }).join("");

  box.innerHTML = summary + cards;
}

function renderLifestyleOptions() {
  const box = document.getElementById("lifestyle-options");
  box.innerHTML = LIFESTYLES.map(l => `
    <div class="lifestyle-card" data-id="${l.id}">
      <div class="lf-head">${l.emoji} ${l.name}</div>
      <div class="lf-slot">${l.slot}</div>
    </div>
  `).join("");
  box.querySelectorAll(".lifestyle-card").forEach(el => {
    el.onclick = () => {
      box.querySelectorAll(".lifestyle-card").forEach(x => x.classList.remove("selected"));
      el.classList.add("selected");
    };
  });
}

let qi = 0;
let answers = [];  // answers[qi] = 选项索引（可为 null）
let dims = { G: 0, S: 0, T: 0, M: 0 };

function renderQ() {
  const q = QUESTIONS[qi];
  const total = QUESTIONS.length;
  document.getElementById("q-progress").textContent = `第 ${qi + 1} / ${total} 题`;
  document.getElementById("q-bar-fill").style.width = `${((qi + 1) / total) * 100}%`;
  document.getElementById("q-text").textContent = q.q;
  const box = document.getElementById("q-options");
  box.innerHTML = "";
  q.opts.forEach((o, i) => {
    const d = document.createElement("div");
    d.className = "option" + (answers[qi] === i ? " picked" : "");
    d.textContent = o.t;
    d.onclick = () => pick(i);
    box.appendChild(d);
  });
  // 按钮状态
  document.getElementById("btn-prev").disabled = qi === 0;
  const next = document.getElementById("btn-next");
  next.disabled = answers[qi] == null;
  next.textContent = qi === total - 1 ? "查看结果 →" : "下一题 →";
}

function pick(i) {
  answers[qi] = i;
  // 只更新当前题的 UI，不直接改 dims（最后统一计算）
  document.querySelectorAll("#q-options .option").forEach((el, idx) => {
    el.classList.toggle("picked", idx === i);
  });
  document.getElementById("btn-next").disabled = false;
}

function goPrev() {
  if (qi > 0) { qi--; renderQ(); }
}
function goNext() {
  if (answers[qi] == null) return;
  if (qi < QUESTIONS.length - 1) { qi++; renderQ(); }
  else finishTest();
}
function finishTest() {
  // 根据所有 answers 统一计算 dims
  dims = { G: 0, S: 0, T: 0, M: 0 };
  answers.forEach((idx, qq) => {
    if (idx == null) return;
    const opt = QUESTIONS[qq].opts[idx];
    Object.entries(opt.s).forEach(([k, v]) => dims[k] += v);
  });
  showResult();
}

let currentTag = null, currentCode = null;

function showResult() {
  currentCode =
    (dims.G >= 0 ? "G" : "F") +
    (dims.S >= 0 ? "S" : "L") +
    (dims.T >= 0 ? "T" : "I") +
    (dims.M >= 0 ? "M" : "X");
  const tag = TAGS[currentCode];
  currentTag = tag;
  document.getElementById("r-tag").textContent = tag.name;
  document.getElementById("r-code").textContent = currentCode + " 型";
  document.getElementById("r-desc").textContent = tag.desc;
  document.getElementById("r-stat").textContent = tag.stat;
  document.getElementById("r-bars").innerHTML = renderBars();
  document.getElementById("test-quiz").classList.add("hidden");
  document.getElementById("test-result").classList.remove("hidden");
  // 自动生成海报（不需要用户点按钮）
  drawPoster();
}

function renderBars() {
  // 每维度最大值约 ±10（5 题 × ±2），转成 0-100% 条
  const pairs = [
    { k: "G", pos: "肝度 G", neg: "佛度 F", max: 10 },
    { k: "S", pos: "社交 S", neg: "独行 L", max: 10 },
    { k: "T", pos: "策略 T", neg: "直觉 I", max: 10 },
    { k: "M", pos: "经济 M", neg: "经验 X", max: 10 }
  ];
  return pairs.map(p => {
    const v = dims[p.k];
    const pct = Math.max(0, Math.min(100, 50 + (v / p.max) * 50));
    const leaning = v >= 0 ? p.pos : p.neg;
    return `
      <div style="margin-bottom: 8px;">
        <div style="display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 2px;">
          <span>${p.neg}</span><b style="color: #4a7c59;">${leaning}</b><span>${p.pos}</span>
        </div>
        <div style="height: 8px; background: #eee; border-radius: 4px; position: relative;">
          <div style="position: absolute; left: 50%; top: -2px; bottom: -2px; width: 2px; background: #999;"></div>
          <div style="height: 100%; background: linear-gradient(90deg, #a8d5b1, #4a7c59); border-radius: 4px; width: ${pct}%;"></div>
        </div>
      </div>`;
  }).join("");
}

// ========== 海报生成 ==========
// 布局（canvas 750×1280）：
//   0–110    顶部标题栏
//   110–650  角色立绘（540px 高）
//   650–720  类型码
//   720–810  人格名大字
//   810–1110 描述卡片（含 stat 条）
//   1110–1280 底部 CTA
// 本地 file:// 协议下禁用 crossOrigin，否则图片会被 CORS 拦截。

function drawPoster() {
  const canvas = document.getElementById("poster-canvas");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;

  ctx.clearRect(0, 0, W, H);
  drawPosterBackground(ctx, W, H);

  const img = new Image();
  img.onload = () => {
    drawCharacterImage(ctx, W, img);
    drawPosterForeground(ctx, W, H);
  };
  img.onerror = () => {
    drawPlaceholder(ctx, W);
    drawPosterForeground(ctx, W, H);
  };
  img.src = `${currentCode}.png`;
}

function drawPosterBackground(ctx, W, H) {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, "#fff8e0");
  grad.addColorStop(0.45, "#e8f0d0");
  grad.addColorStop(1, "#a8d5b1");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 顶部白条标题
  ctx.fillStyle = "rgba(255,255,255,0.92)";
  roundRect(ctx, 200, 35, 350, 60, 30);
  ctx.fill();
  ctx.fillStyle = "#3a5a3a";
  ctx.font = "bold 28px -apple-system, PingFang SC, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("我的农场人格", W / 2, 74);
}

function drawCharacterImage(ctx, W, img) {
  // 在 y=110 到 y=650 的 540px 高度内等比居中
  const bandTop = 110, bandH = 540, maxW = 560;
  const ratio = Math.min(maxW / img.width, bandH / img.height);
  const w = img.width * ratio, h = img.height * ratio;
  const x = (W - w) / 2, y = bandTop + (bandH - h) / 2;
  ctx.drawImage(img, x, y, w, h);
}

function drawPlaceholder(ctx, W) {
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  roundRect(ctx, W / 2 - 220, 170, 440, 440, 24);
  ctx.fill();
  ctx.strokeStyle = "#4a7c59";
  ctx.lineWidth = 3;
  ctx.setLineDash([8, 6]);
  roundRect(ctx, W / 2 - 220, 170, 440, 440, 24);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "#4a7c59";
  ctx.font = "bold 22px -apple-system, PingFang SC, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("未找到角色图片", W / 2, 380);
  ctx.font = "16px -apple-system, PingFang SC, sans-serif";
  ctx.fillStyle = "#666";
  ctx.fillText(`请放置：${currentCode}.png`, W / 2, 410);
}

function drawPosterForeground(ctx, W, H) {
  // 类型码小标
  ctx.fillStyle = "#4a7c59";
  ctx.font = "bold 26px -apple-system, PingFang SC, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(`— ${currentCode} 型 —`, W / 2, 690);

  // 人格名大字（描边+填充，增强可读性）
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "#2a5a3a";
  ctx.lineWidth = 7;
  ctx.font = "bold 62px -apple-system, PingFang SC, sans-serif";
  ctx.strokeText(currentTag.name, W / 2, 770);
  ctx.fillText(currentTag.name, W / 2, 770);

  // 描述卡片
  const cardX = 50, cardY = 810, cardW = 650, cardH = 300;
  ctx.fillStyle = "rgba(255, 255, 255, 0.95)";
  roundRect(ctx, cardX, cardY, cardW, cardH, 24);
  ctx.fill();

  // 描述文本
  ctx.fillStyle = "#333";
  ctx.textAlign = "left";
  ctx.font = "24px -apple-system, PingFang SC, sans-serif";
  wrapText(ctx, currentTag.desc, cardX + 30, cardY + 45, cardW - 60, 36);

  // stat 高亮条
  const barY = cardY + cardH - 55;
  ctx.fillStyle = "#fff3d0";
  roundRect(ctx, cardX + 25, barY, cardW - 50, 42, 10);
  ctx.fill();
  ctx.fillStyle = "#8a5a00";
  ctx.font = "bold 19px -apple-system, PingFang SC, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText(currentTag.stat, W / 2, barY + 27);

  // 底部 CTA
  ctx.fillStyle = "#2a5a3a";
  ctx.font = "bold 28px -apple-system, PingFang SC, sans-serif";
  ctx.textAlign = "center";
  ctx.fillText("你是哪种农民？扫码来测测", W / 2, 1145);

  ctx.font = "18px -apple-system, PingFang SC, sans-serif";
  ctx.fillStyle = "#555";
  ctx.fillText("农场规划器 · 24 题测人格 + 种植推荐", W / 2, 1180);

  // 真实二维码（扫码直达当前部署的网址）
  drawQRCode(ctx, W);
}

function drawQRCode(ctx, W, retries) {
  // 部署后的线上地址；本地打开时 QR 也会指向这里方便别人扫
  const DEPLOY_URL = "https://cedarar.github.io/farm/";
  const url = window.location.href.startsWith("http") ? window.location.href : DEPLOY_URL;
  const qrSize = 140, qrX = (W - qrSize) / 2, qrY = 1200;

  // 白底
  const drawBg = () => {
    ctx.fillStyle = "#fff";
    roundRect(ctx, qrX - 6, qrY - 6, qrSize + 12, qrSize + 12, 8);
    ctx.fill();
  };
  drawBg();

  // 库还没加载到：最多重试 10 次（5 秒）
  if (typeof qrcode === "undefined") {
    const tries = retries || 0;
    if (tries >= 10) {
      ctx.fillStyle = "#c04040";
      ctx.font = "13px sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("QR 库加载失败", W / 2, qrY + qrSize / 2);
      ctx.fillText("（刷新页面重试）", W / 2, qrY + qrSize / 2 + 18);
      return;
    }
    ctx.fillStyle = "#888";
    ctx.font = "13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("QR 加载中...", W / 2, qrY + qrSize / 2);
    setTimeout(() => drawQRCode(ctx, W, tries + 1), 500);
    return;
  }

  // 直接用 canvas 像素级渲染 QR
  try {
    const qr = qrcode(0, "M");
    qr.addData(url);
    qr.make();
    const count = qr.getModuleCount();
    const cell = qrSize / count;
    ctx.fillStyle = "#000";
    for (let r = 0; r < count; r++) {
      for (let c = 0; c < count; c++) {
        if (qr.isDark(r, c)) {
          ctx.fillRect(qrX + c * cell, qrY + r * cell, cell + 0.5, cell + 0.5);
        }
      }
    }
  } catch (e) {
    ctx.fillStyle = "#c04040";
    ctx.font = "13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("QR 生成失败", W / 2, qrY + qrSize / 2);
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  const chars = text.split("");
  let line = "", lineY = y;
  for (const c of chars) {
    const test = line + c;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, lineY);
      line = c;
      lineY += lineH;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, lineY);
}

function downloadPoster() {
  const canvas = document.getElementById("poster-canvas");
  try {
    const link = document.createElement("a");
    link.download = `农场人格_${currentTag.name}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  } catch (e) {
    // 本地 file:// 打开时 canvas 可能被 CORS 污染，无法导出
    document.getElementById("download-hint").textContent =
      "本地打开时浏览器可能禁止自动下载，请右键海报 → 图片另存为。";
    document.getElementById("download-hint").style.color = "#c0a040";
  }
}

// ========== 导航 ==========
function show(v) {
  ["planner", "weekend", "test"].forEach(x => {
    document.getElementById("view-" + x).classList.toggle("hidden", x !== v);
    document.getElementById("nav-" + x).className = x === v ? "" : "secondary";
  });
  if (v === "weekend") renderWeekend();
}

document.getElementById("nav-planner").onclick = () => show("planner");
document.getElementById("nav-weekend").onclick = () => show("weekend");
document.getElementById("nav-test").onclick = () => show("test");

document.querySelectorAll(".mode-btn").forEach(b => {
  b.onclick = () => {
    document.querySelectorAll(".mode-btn").forEach(x => x.classList.add("secondary"));
    b.classList.remove("secondary");
    // 作息模式显示/隐藏选择器
    const picker = document.getElementById("lifestyle-picker");
    if (b.dataset.mode === "lifestyle") picker.classList.remove("hidden");
    else picker.classList.add("hidden");
  };
});

document.getElementById("btn-plan").onclick = renderPlan;
document.getElementById("btn-weekend").onclick = renderWeekend;

function resetTest() {
  qi = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  dims = { G: 0, S: 0, T: 0, M: 0 };
}
document.getElementById("btn-start").onclick = () => {
  resetTest();
  document.getElementById("test-intro").classList.add("hidden");
  document.getElementById("test-quiz").classList.remove("hidden");
  renderQ();
};
document.getElementById("btn-retry").onclick = () => {
  resetTest();
  document.getElementById("test-result").classList.add("hidden");
  document.getElementById("test-intro").classList.remove("hidden");
};
document.getElementById("btn-prev").onclick = goPrev;
document.getElementById("btn-next").onclick = goNext;
// 动态写入题目数量
document.getElementById("intro-count").textContent = `${QUESTIONS.length} 道题，3 分钟出结果。`;
document.getElementById("btn-to-planner").onclick = () => show("planner");
document.getElementById("btn-download").onclick = downloadPoster;
</script>
